services:
  - type: web
    name: expense-tracker-web
    runtime: docker
    plan: free
    dockerfilePath: ./ExpenseTracker/Dockerfile
    dockerContext: ./ExpenseTracker
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: expense-data
      mountPath: /app/Data
      sizeGB: 1
